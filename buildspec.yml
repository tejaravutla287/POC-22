version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies...
      - npm install
  pre_build:
    commands:
      - echo Running tests...
      - npm test
  build:
    commands:
      - echo Configuring SSH access...
      - mkdir -p ~/.ssh
      - echo "$SSH_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - echo -e "Host *\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config
      - echo Deploying application files directly to EC2...
      - rsync -avz --exclude '.git' --exclude 'node_modules' ./ ec2-user@$EC2_IP:/home/ec2-user/app/
      - echo Starting application via SSH...
      - ssh ec2-user@$EC2_IP "cd /home/ec2-user/app && npm install && sudo npm install pm2 -g && (pm2 delete node-app || true) && pm2 start app.js --name 'node-app'"
